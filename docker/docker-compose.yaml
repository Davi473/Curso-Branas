services:
  backend:
    build:
      context: .
    ports:
      - 3000:3000
      - 5172:5172
      - 3003:3003
    volumes:
      - ..:/app
    working_dir: /app
    command: sleep infinity
    stop_grace_period: 2s

  db-account:
    image: postgres:14.3
    ports:
      - 5433:5432
    volumes: 
      - ../database/create-account.sql:/docker-entrypoint-initdb.d/init.sql
    environment: 
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: app

  db-query:
    image: postgres:14.3
    ports:
      - 5434:5432
    volumes: 
      - ../database/create-query.sql:/docker-entrypoint-initdb.d/init.sql
    environment: 
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: app

  queue:
    image: rabbitmq:3-management
    ports: 
      - 5672:5672
      - 15672:15672
  
